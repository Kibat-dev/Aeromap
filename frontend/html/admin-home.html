<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Painel administrativo - Visualize e gerencie campanhas promocionais ativas." />
  <meta name="theme-color" content="#000000" />
  <title>Aromap - Admin</title>
  <link rel="stylesheet" href="/static/css/admin-home.css" />
</head>
<body>
  <div class="page-shell">
    <div class="page-paper">
      <header class="topbar">
        <div class="brand-wrap">
          <img src="/static/img/logo-aromap.png" alt="Aromap" class="brand-logo" />
        </div>

        <nav class="topnav">
          <a href="/admin" class="active">Home</a>
          <a href="/admin/campanhas">Campanhas</a>
          <a href="/admin/relatorios">Relatórios</a>
          <a href="/login">Sair</a>
        </nav>
      </header>

      <main class="admin-content" role="main">
        <section class="campaign-panel">
          <div class="campaign-header">
            <div class="campaign-header-left">
              <h1 id="mainTitle">Campanhas recentes</h1>
            </div>
          </div>
          <div class="campaign-divider" aria-hidden="true"></div>

          <div class="campaign-grid" id="campaignGrid" role="list" aria-labelledby="mainTitle">
            <!-- preenchido dinamicamente por admin-home.js -->
          </div>
        </section>

        <section class="admin-summary">
          <div class="summary-block summary-list">
            <div class="summary-title-row">
              <h3 id="activeTitle">Campanhas ativas</h3>
              <div class="summary-line" aria-hidden="true"></div>
            </div>

            <ul id="listaAtivas" role="list" aria-labelledby="activeTitle">
              <!-- preenchido dinamicamente -->
            </ul>
          </div>

          <div class="summary-vertical-line" aria-hidden="true"></div>

          <div class="summary-block summary-metrics">
            <div class="summary-title-row">
              <h3 id="metricsTitle">Visão Geral</h3>
              <div class="summary-line" aria-hidden="true"></div>
            </div>

            <div class="metric-grid" role="list" aria-labelledby="metricsTitle">
              <div class="metric-card" role="listitem">
                <strong id="metAtivas" aria-label="Número de campanhas ativas">—</strong>
                <span>Campanhas Ativas</span>
              </div>

              <div class="metric-card" role="listitem">
                <strong id="metTotal" aria-label="Total de campanhas criadas">—</strong>
                <span>Campanhas Criadas</span>
              </div>

              <div class="metric-card" role="listitem">
                <strong id="metNotifs" aria-label="Total de notificações enviadas">—</strong>
                <span>Notificações Enviadas</span>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="page-footer" role="contentinfo">
        <div class="footer-line" aria-hidden="true"></div>
        <img src="/static/img/logo-aromap.png" alt="Aromap" class="footer-logo" />
      </footer>
    </div>
  </div>

  <script src="/static/js/admin-home.js"></script>
</body>
</html>
