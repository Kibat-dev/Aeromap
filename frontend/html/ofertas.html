<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore ofertas disponíveis de cafés e bebidas. Promoções perto de você agora." />
  <meta name="theme-color" content="#000000" />
  <title>Aromap - Ofertas</title>
  <link rel="stylesheet" href="/static/css/home.css" />
  <link rel="stylesheet" href="/static/css/ofertas.css" />
</head>
<body>
  <div class="page-shell">
    <div class="page-paper">

      <header class="topbar">
        <div class="brand-wrap">
          <img src="/static/img/logo-aromap.png" alt="Aromap" class="brand-logo" />
        </div>
        <nav class="topnav">
          <a href="/home">Início</a>
          <a href="#" class="active">Ofertas</a>
          <a href="/perfil">Meu perfil</a>
          <button class="notif-btn" aria-label="Notificações">
            <span class="notif-icon">🔔</span>
            <span class="notif-badge">1</span>
          </button>
        </nav>
      </header>

      <main class="content">

        <!-- Filtros -->
        <section class="filter-section" aria-labelledby="offersMainTitle">
          <div class="filter-header">
            <h1 id="offersMainTitle">Ofertas</h1>
            <p>Promoções disponíveis perto de você agora</p>
          </div>

          <div class="filter-bar" role="group" aria-label="Filtros de ofertas">
            <button class="filter-chip active" data-filter="all" aria-pressed="true" title="Mostrar todas as ofertas">Todas</button>
            <button class="filter-chip" data-filter="active" aria-pressed="false" title="Mostrar ofertas ativas agora">Ativas agora</button>
            <button class="filter-chip" data-filter="scheduled" aria-pressed="false" title="Mostrar ofertas agendadas">Agendadas</button>
            <button class="filter-chip" data-filter="vilamariana" aria-pressed="false" title="Filtrar por Vila Mariana">Vila Mariana</button>
            <button class="filter-chip" data-filter="jardimpaulista" aria-pressed="false" title="Filtrar por Jardim Paulista">Jardim Paulista</button>
          </div>

          <div class="filter-divider" aria-hidden="true"></div>
        </section>

        <!-- Grid de ofertas -->
        <section class="offers-section" aria-live="polite" aria-label="Lista de ofertas disponíveis">
          <div class="offers-grid-full" id="offersGrid" role="list">
            <!-- preenchido dinamicamente por ofertas.js -->
          </div>

          <p class="no-results" id="noResults" style="display:none;" role="status">
            Nenhuma oferta encontrada para este filtro.
          </p>
        </section>
      </main>

      <footer class="page-footer" role="contentinfo">
        <div class="footer-line" aria-hidden="true"></div>
        <img src="/static/img/logo-aromap.png" alt="Aromap" class="footer-logo" />
        <a href="/perfil" class="preferences-link" title="Acesse suas preferências de ofertas">Editar preferências</a>
      </footer>
    </div>
  </div>

  <script src="/static/js/ofertas.js?v=3"></script>
</body>
</html>
